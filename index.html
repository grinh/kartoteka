    <script>
        window.downloadJson = function (content, filename) {
            const blob = new Blob([content], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };

        window.triggerClick = function (id) {
            document.getElementById(id)?.click();
        };

        function resizeTextarea(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }

        window.resizeAllTextareas = function () {
            document.querySelectorAll('.police-card textarea').forEach(resizeTextarea);
        };

        document.addEventListener('input', function (e) {
            if (e.target.tagName === 'TEXTAREA') resizeTextarea(e.target);
        });

        window.generateCardPdf = async function () {
            const card = document.querySelector('.police-card');
            const toolbar = document.querySelector('.card-toolbar');

            if (toolbar) toolbar.style.visibility = 'hidden';

            try {
                const canvas = await html2canvas(card, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: '#f5eddc',
                    onclone: function (clonedDoc) {
                        // html2canvas nie renderuje textarea.value — podmieniamy na divy
                        clonedDoc.querySelectorAll('.police-card textarea').forEach(clonedTa => {
                            const orig = card.querySelector('#' + clonedTa.id);
                            if (!orig) return;
                            const cs = getComputedStyle(orig);
                            const div = clonedDoc.createElement('div');
                            div.style.fontFamily = cs.fontFamily;
                            div.style.fontSize   = cs.fontSize;
                            div.style.color      = cs.color;
                            div.style.padding    = cs.padding;
                            div.style.margin     = cs.margin;
                            div.style.width      = cs.width;
                            div.style.minHeight  = orig.scrollHeight + 'px';
                            div.style.background = cs.backgroundColor;
                            div.style.border     = cs.border;
                            div.style.boxSizing  = 'border-box';
                            div.style.whiteSpace = 'pre-wrap';
                            div.style.wordBreak  = 'break-word';
                            div.textContent = orig.value;
                            clonedTa.replaceWith(div);
                        });
                    }
                });

                const { jsPDF } = window.jspdf;
                const pxToMm   = 0.264583;
                const widthMm  = (canvas.width  / 2) * pxToMm;
                const heightMm = (canvas.height / 2) * pxToMm;

                const pdf = new jsPDF({
                    orientation: 'portrait',
                    unit: 'mm',
                    format: [widthMm, heightMm]
                });

                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, widthMm, heightMm);
                pdf.save('kartoteka.pdf');
            } finally {
                if (toolbar) toolbar.style.visibility = '';
            }
        };
    </script>
